<div class="sidebar" [class.collapsed]="collapsed">
  <!-- Logo -->
  <div class="sidebar-header">
    <a routerLink="/dashboard" class="logo" [class.collapsed]="collapsed">
      <mat-icon>linear_scale</mat-icon>
      <span *ngIf="!collapsed">Planora</span>
    </a>
  </div>

  <!-- Navigation principale -->
  <nav class="sidebar-nav">
    <a routerLink="/dashboard"
       routerLinkActive="active"
       class="nav-item"
       [matTooltip]="collapsed ? 'Dashboard' : ''"
       [matTooltipPosition]="'right'">
      <mat-icon>dashboard</mat-icon>
      <span *ngIf="!collapsed">Dashboard</span>
    </a>

    <a routerLink="/projects"
       routerLinkActive="active"
       class="nav-item"
       [matTooltip]="collapsed ? 'Projects' : ''"
       [matTooltipPosition]="'right'">
      <mat-icon>folder_open</mat-icon>
      <span *ngIf="!collapsed">Projects</span>
    </a>

   

    <a routerLink="/users"
       routerLinkActive="active"
       class="nav-item"
       *ngIf="authService.hasRole(['Admin'])"
       [matTooltip]="collapsed ? 'Users' : ''"
       [matTooltipPosition]="'right'">
      <mat-icon>people</mat-icon>
      <span *ngIf="!collapsed">Users</span>
    </a>
  </nav>

  <!-- Navigation du projet -->
  <ng-container *ngIf="showProjectNav && currentProject">
    <div class="sidebar-divider" *ngIf="!collapsed"></div>

    <div class="project-section">
      <div class="project-header" [class.collapsed]="collapsed">
        <div class="project-avatar" [style.background]="getProjectColor()"
             [matTooltip]="collapsed ? currentProject.name : ''"
             [matTooltipPosition]="'right'">
          {{ currentProject.name?.charAt(0) || 'P' }}
        </div>
        <span class="project-name" *ngIf="!collapsed">{{ currentProject.name }}</span>
      </div>

      <div class="project-nav">
        <a [routerLink]="['/projects', currentProject.id, 'backlog']"
           routerLinkActive="active"
           class="project-nav-item"
           [matTooltip]="collapsed ? 'Backlog' : ''"
           [matTooltipPosition]="'right'">
          <mat-icon>inbox</mat-icon>
          <span *ngIf="!collapsed">Backlog</span>
          <span class="badge" *ngIf="!collapsed && backlogCount > 0">{{ backlogCount }}</span>
        </a>

        <a [routerLink]="['/projects', currentProject.id, 'board']"
           routerLinkActive="active"
           class="project-nav-item"
           [matTooltip]="collapsed ? 'Tableau' : ''"
           [matTooltipPosition]="'right'">
          <mat-icon>view_kanban</mat-icon>
          <span *ngIf="!collapsed">Tableau</span>
        </a>

        <a [routerLink]="['/projects', currentProject.id, 'tasks']"
           routerLinkActive="active"
           class="project-nav-item"
           [matTooltip]="collapsed ? 'Tâches' : ''"
           [matTooltipPosition]="'right'">
          <mat-icon>task_alt</mat-icon>
          <span *ngIf="!collapsed">Tâches</span>
        </a>

        <!-- ✅ Historique des sprints du projet -->
        <a [routerLink]="['/projects', currentProject.id, 'history']"
           routerLinkActive="active"
           class="project-nav-item"
           [matTooltip]="collapsed ? 'Historique' : ''"
           [matTooltipPosition]="'right'">
          <mat-icon>history</mat-icon>
          <span *ngIf="!collapsed">Historique</span>
        </a>
      </div>
    </div>
  </ng-container>

  <div class="sidebar-spacer"></div>

  <!-- Footer utilisateur -->
  <div class="sidebar-footer" [class.collapsed]="collapsed">
    <div class="user-info" [matTooltip]="collapsed ? userName : ''" [matTooltipPosition]="'right'">
      <div class="user-avatar">
        {{ userInitials }}
      </div>
      <div class="user-details" *ngIf="!collapsed">
        <div class="user-name">{{ userName }}</div>
        <div class="user-email">{{ userEmail }}</div>
      </div>
      <button mat-icon-button class="logout-btn" (click)="logout()" [matTooltip]="collapsed ? 'Déconnexion' : ''">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </div>
</div>
